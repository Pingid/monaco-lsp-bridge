name: Release and publish

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  release_github:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: install dependencies
        run: pnpm install
      - name: transpile typescript
        run: pnpm run build
      - name: run tests
        run: pnpm test
      - name: Get latest release tag
        id: latest_release_tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          echo "tag_name=$latest_tag" >> $GITHUB_OUTPUT
      - name: Get current version
        id: current_version
        run: echo "version=$(node -e 'console.log(require(`./package.json`).version)')" >> $GITHUB_OUTPUT
      - name: Create a new release
        uses: softprops/action-gh-release@v1
        if: ${{ steps.latest_release_tag.outputs.tag_name != steps.current_version.outputs.version }}
        with:
          tag_name: ${{ steps.current_version.outputs.version }}
          token: ${{ github.token }}
  publish_npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: install dependencies
        run: pnpm install
      - name: transpile typescript
        run: pnpm run build
      - name: run tests
        run: pnpm test
      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Determine dist-tag
        id: dist_tag
        run: |
          if [[ "${{ github.ref_name }}" == "dev" || "${{ steps.pkg.outputs.version }}" == *-* ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
      - name: Get currently-published version on this dist-tag
        id: latest_version
        run: |
          v=$(npm view "${{ steps.pkg.outputs.name }}@${{ steps.dist_tag.outputs.tag }}" version 2>/dev/null || echo "")
          echo "version=$v" >> $GITHUB_OUTPUT
      - name: Publish package
        if: ${{ steps.pkg.outputs.version != steps.latest_version.outputs.version }}
        run: npm publish --access public --provenance --tag ${{ steps.dist_tag.outputs.tag }}
